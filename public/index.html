<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積もり生成AI - 図面PDF → 見積書自動作成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-sub: #f5f7fa;
  --text: #1a1a2e;
  --text-sub: #4a5568;
  --accent: #1e3a5f;
  --accent-light: #2d5a8e;
  --success: #276749;
  --warning: #975a16;
  --error: #c53030;
  --border: #e2e8f0;
  --shadow: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 8px;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-sub);
  color: var(--text);
  line-height: 1.9;
  font-size: 15px;
  min-height: 100vh;
}

/* ===== ヘッダー ===== */
.header {
  background: linear-gradient(135deg, var(--accent) 0%, #142d4c 100%);
  color: #fff;
  padding: 24px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.header h1 span {
  font-weight: 400;
  opacity: 0.8;
  font-size: 14px;
  margin-left: 12px;
}
.header-badge {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-badge .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #48bb78;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== メインコンテンツ ===== */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px;
}

/* ===== セットアップセクション ===== */
.setup-section {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
}
.setup-section h2 {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.setup-section h2 .step-num {
  background: var(--accent);
  color: #fff;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* ===== フォーム ===== */
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sub);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.form-group input[type="text"],
.form-group input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: 'Inter', monospace;
  transition: border-color 0.2s;
}
.form-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(30,58,95,0.1);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ===== ボタン ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 2px solid var(--accent);
}
.btn-outline:hover {
  background: var(--accent);
  color: #fff;
}
.btn-success {
  background: var(--success);
  color: #fff;
}
.btn-success:hover {
  background: #22543d;
}
.btn-sm {
  padding: 8px 16px;
  font-size: 13px;
}

/* ===== APIキー状態 ===== */
.api-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.api-status.connected {
  background: #f0fff4;
  color: var(--success);
  border: 1px solid #c6f6d5;
}
.api-status.disconnected {
  background: #fff5f5;
  color: var(--error);
  border: 1px solid #fed7d7;
}

/* ===== ファイルアップロード ===== */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 48px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--bg-sub);
  position: relative;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(30,58,95,0.03);
}
.upload-zone.has-file {
  border-color: var(--success);
  border-style: solid;
  background: #f0fff4;
}
.upload-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.6;
}
.upload-zone h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.upload-zone p {
  font-size: 14px;
  color: var(--text-sub);
}
.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.file-info {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}
.file-info .file-icon {
  font-size: 32px;
}
.file-info .file-details {
  text-align: left;
}
.file-info .file-name {
  font-weight: 700;
  color: var(--text);
}
.file-info .file-size {
  font-size: 13px;
  color: var(--text-sub);
}

/* ===== プログレス ===== */
.progress-section {
  display: none;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
}
.progress-section.visible { display: block; }

.progress-bar-outer {
  background: #edf2f7;
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px;
  transition: width 0.5s ease;
  width: 0%;
}
.progress-bar-inner.indeterminate {
  width: 30%;
  animation: indeterminate 1.5s infinite ease-in-out;
}
@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

.progress-status {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.spinner {
  width: 20px; height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.progress-log {
  margin-top: 16px;
  padding: 16px;
  background: #1a1a2e;
  border-radius: var(--radius);
  font-family: 'Inter', monospace;
  font-size: 13px;
  color: #a0aec0;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.6;
}
.progress-log .log-entry {
  padding: 2px 0;
}
.progress-log .log-entry.success { color: #68d391; }
.progress-log .log-entry.error { color: #fc8181; }
.progress-log .log-entry.info { color: #63b3ed; }

/* ===== 見積書表示 ===== */
.estimate-section {
  display: none;
}
.estimate-section.visible { display: block; }

.estimate-actions {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.estimate-document {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

/* 見積書ヘッダー */
.est-header {
  background: linear-gradient(135deg, var(--accent) 0%, #142d4c 100%);
  color: #fff;
  padding: 32px 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.est-header-left h2 {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
}
.est-header-left p {
  font-size: 14px;
  opacity: 0.8;
}
.est-header-right {
  text-align: right;
  font-size: 14px;
  line-height: 1.8;
}

/* 見積書サマリー */
.est-summary {
  padding: 32px 40px;
  border-bottom: 1px solid var(--border);
}
.est-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.est-summary-left { }
.est-summary-right { }
.est-info-row {
  display: flex;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
}
.est-info-label {
  font-size: 13px;
  color: var(--text-sub);
  width: 140px;
  flex-shrink: 0;
}
.est-info-value {
  font-size: 15px;
  font-weight: 500;
}
.est-total-box {
  background: var(--bg-sub);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
}
.est-total-label {
  font-size: 14px;
  color: var(--text-sub);
  margin-bottom: 4px;
}
.est-total-amount {
  font-family: 'Inter', sans-serif;
  font-size: 42px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.2;
}
.est-total-amount small {
  font-size: 18px;
  font-weight: 600;
}
.est-total-breakdown {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-sub);
}

/* 見積書テーブル */
.est-body {
  padding: 32px 40px;
}
.est-body h3 {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
}

.est-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-bottom: 32px;
}
.est-table th {
  background: var(--accent);
  color: #fff;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.est-table th.num { text-align: right; }
.est-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.est-table td.num {
  text-align: right;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  white-space: nowrap;
}
.est-table tr.category-row {
  background: #edf2f7;
  font-weight: 700;
}
.est-table tr.category-row td {
  padding: 12px 14px;
  border-bottom: 2px solid var(--accent);
}
.est-table tr.item-row td {
  padding-left: 28px;
}
.est-table tr.detail-row td {
  padding-left: 48px;
  font-size: 13px;
  color: var(--text-sub);
}
.est-table tr.subtotal-row {
  background: #f7fafc;
  font-weight: 700;
}
.est-table tr.subtotal-row td {
  border-top: 2px solid var(--border);
}
.est-table tr.total-row {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 16px;
}
.est-table tr.total-row td {
  padding: 14px;
  border: none;
}
.est-table tr.discount-row td {
  color: var(--error);
}

/* 特記事項 */
.est-notes {
  padding: 24px 40px 32px;
  border-top: 1px solid var(--border);
}
.est-notes h4 {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
}
.est-notes ul {
  list-style: none;
  padding: 0;
}
.est-notes li {
  padding: 4px 0 4px 20px;
  position: relative;
  font-size: 14px;
  color: var(--text-sub);
}
.est-notes li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
}

/* 抽出データセクション */
.extraction-section {
  display: none;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
}
.extraction-section.visible { display: block; }

.extraction-section h3 {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 20px;
}

.floor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.floor-card {
  background: var(--bg-sub);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.floor-card h4 {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
}
.floor-card table {
  width: 100%;
  font-size: 13px;
}
.floor-card table td {
  padding: 3px 0;
}
.floor-card table td:last-child {
  text-align: right;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}

/* タブ */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  border-bottom: 2px solid var(--border);
}
.tab {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
  font-family: 'Noto Sans JP', sans-serif;
}
.tab.active {
  color: var(--accent);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

/* ===== 印刷スタイル ===== */
@media print {
  body { background: #fff; }
  .header, .setup-section, .progress-section, .estimate-actions, .extraction-section, .tabs, .no-print { display: none !important; }
  .estimate-section { display: block !important; }
  .estimate-document { box-shadow: none; border: none; }
  .est-table { font-size: 11px; }
  .est-header { padding: 20px 24px; }
  .est-body { padding: 20px 24px; }
  .est-summary { padding: 20px 24px; }
  @page { size: A4 landscape; margin: 10mm; }
}

/* ===== レスポンシブ ===== */
@media (max-width: 768px) {
  .main { padding: 16px; }
  .est-summary-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .est-header { flex-direction: column; gap: 16px; }
  .est-header-right { text-align: left; }
  .est-body { padding: 16px; }
  .est-total-amount { font-size: 32px; }
}

/* カテゴリ展開 */
.category-toggle {
  cursor: pointer;
  user-select: none;
}
.category-toggle::before {
  content: '\25BC';
  display: inline-block;
  margin-right: 8px;
  font-size: 10px;
  transition: transform 0.2s;
}
.category-toggle.collapsed::before {
  transform: rotate(-90deg);
}
.collapsible-content {
  transition: max-height 0.3s ease;
  overflow: hidden;
}
.collapsible-content.collapsed {
  display: none;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>EstimateAI<span>図面PDF → 見積書自動生成</span></h1>
    <div class="header-badge">
      <div class="dot"></div>
      Claude Opus 4 搭載
    </div>
  </div>
</header>

<main class="main">
  <!-- Step 1: APIキー設定 -->
  <section class="setup-section" id="step1">
    <h2><span class="step-num">1</span>APIキー設定</h2>
    <div class="form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="btn btn-primary btn-sm" onclick="setApiKey()">接続</button>
      <span id="apiStatus" class="api-status disconnected">未接続</span>
    </div>
  </section>

  <!-- Step 2: PDF + 情報入力 -->
  <section class="setup-section" id="step2">
    <h2><span class="step-num">2</span>図面PDFアップロード</h2>
    <div class="form-row" style="margin-bottom:20px;">
      <div class="form-group">
        <label>工事名称（任意）</label>
        <input type="text" id="projectName" placeholder="例: 全館照明器具LED化工事">
      </div>
      <div class="form-group">
        <label>宛先（任意）</label>
        <input type="text" id="clientName" placeholder="例: SOMPOコーポレートサービス株式会社">
      </div>
    </div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="pdfInput" accept=".pdf">
      <div id="uploadContent">
        <div class="upload-icon">PDF</div>
        <h3>図面PDFをドロップ、またはクリックして選択</h3>
        <p>施工図面・機器リスト・エリア図などを含むPDFファイル（最大50MB）</p>
      </div>
    </div>
    <div style="margin-top:20px; text-align:center;">
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        AIで見積書を生成
      </button>
    </div>
  </section>

  <!-- プログレス -->
  <section class="progress-section" id="progressSection">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner indeterminate" id="progressBar"></div>
    </div>
    <div class="progress-status">
      <div class="spinner" id="progressSpinner"></div>
      <span id="progressText">処理中...</span>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </section>

  <!-- 結果表示 -->
  <section class="estimate-section" id="estimateSection">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('estimate')">見積書</button>
      <button class="tab" onclick="switchTab('extraction')">抽出データ</button>
      <button class="tab" onclick="switchTab('raw')">RAWデータ</button>
    </div>

    <div class="estimate-actions no-print">
      <button class="btn btn-primary" onclick="window.print()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        印刷 / PDF保存
      </button>
      <button class="btn btn-outline" onclick="downloadCSV()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        CSV出力
      </button>
      <button class="btn btn-outline" onclick="downloadJSON()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        JSON出力
      </button>
    </div>

    <!-- 見積書タブ -->
    <div id="tab-estimate" class="tab-content">
      <div class="estimate-document" id="estimateDocument"></div>
    </div>

    <!-- 抽出データタブ -->
    <div id="tab-extraction" class="tab-content" style="display:none;">
      <div class="extraction-section visible" id="extractionContent"></div>
    </div>

    <!-- RAWタブ -->
    <div id="tab-raw" class="tab-content" style="display:none;">
      <div style="background:#1a1a2e; border-radius:8px; padding:24px; overflow-x:auto;">
        <pre id="rawData" style="color:#a0aec0; font-family:'Inter',monospace; font-size:13px; white-space:pre-wrap;"></pre>
      </div>
    </div>
  </section>
</main>

<script>
// ===== グローバル変数 =====
let apiKeySet = false;
let selectedFile = null;
let estimateData = null;
let extractionData = null;

// ===== APIキー設定 =====
async function setApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return alert('APIキーを入力してください');

  try {
    const res = await fetch('/api/set-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: key })
    });
    const data = await res.json();
    if (data.success) {
      apiKeySet = true;
      document.getElementById('apiStatus').className = 'api-status connected';
      document.getElementById('apiStatus').textContent = '接続済み';
      checkReady();
    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    alert('接続エラー: ' + e.message);
  }
}

// ===== ファイルアップロード =====
const uploadZone = document.getElementById('uploadZone');
const pdfInput = document.getElementById('pdfInput');

pdfInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (file.type !== 'application/pdf') {
    alert('PDFファイルを選択してください');
    return;
  }
  selectedFile = file;
  uploadZone.classList.add('has-file');
  const sizeMB = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById('uploadContent').innerHTML = `
    <div class="file-info">
      <div class="file-icon">PDF</div>
      <div class="file-details">
        <div class="file-name">${file.name}</div>
        <div class="file-size">${sizeMB} MB</div>
      </div>
    </div>
    <p style="margin-top:12px; font-size:13px; color:var(--success);">ファイル読み込み完了 - 別のファイルに変更する場合はクリック</p>
  `;
  checkReady();
}

function checkReady() {
  document.getElementById('analyzeBtn').disabled = !(apiKeySet && selectedFile);
}

// ===== 解析開始 =====
async function startAnalysis() {
  if (!apiKeySet || !selectedFile) return;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div> 処理中...';

  const progressSection = document.getElementById('progressSection');
  progressSection.classList.add('visible');
  const logEl = document.getElementById('progressLog');
  logEl.innerHTML = '';

  addLog('info', `PDF: ${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(1)} MB)`);
  addLog('info', 'サーバーにアップロード中...');

  const formData = new FormData();
  formData.append('pdf', selectedFile);
  formData.append('projectName', document.getElementById('projectName').value);
  formData.append('clientName', document.getElementById('clientName').value);

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      body: formData
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const event = JSON.parse(line.slice(6));
            handleEvent(event);
          } catch (e) {}
        }
      }
    }
  } catch (e) {
    addLog('error', 'エラー: ' + e.message);
    document.getElementById('progressText').textContent = 'エラーが発生しました';
    document.getElementById('progressSpinner').style.display = 'none';
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> AIで見積書を生成`;
}

function handleEvent(event) {
  switch (event.type) {
    case 'status':
      document.getElementById('progressText').textContent = event.message;
      addLog('info', event.message);
      break;
    case 'extraction':
      addLog('success', '図面データの抽出が完了しました');
      break;
    case 'complete':
      addLog('success', '見積書の生成が完了しました');
      document.getElementById('progressSpinner').style.display = 'none';
      document.getElementById('progressBar').classList.remove('indeterminate');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = '完了';

      extractionData = event.extraction;
      estimateData = event.estimate;

      renderEstimate(event.estimate);
      renderExtraction(event.extraction);
      document.getElementById('rawData').textContent = JSON.stringify(event, null, 2);

      document.getElementById('estimateSection').classList.add('visible');
      setTimeout(() => {
        document.getElementById('estimateSection').scrollIntoView({ behavior: 'smooth' });
      }, 300);
      break;
    case 'error':
      addLog('error', event.message);
      break;
  }
}

function addLog(type, message) {
  const logEl = document.getElementById('progressLog');
  const time = new Date().toLocaleTimeString('ja-JP');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.textContent = `[${time}] ${message}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== 見積書レンダリング =====
function renderEstimate(data) {
  const doc = document.getElementById('estimateDocument');
  const est = data.estimate || data;

  if (data.raw) {
    doc.innerHTML = `<div style="padding:40px;"><h3>生データ（JSON解析不可）</h3><pre style="white-space:pre-wrap;font-size:13px;margin-top:16px;">${escapeHtml(data.raw)}</pre></div>`;
    return;
  }

  const summary = est.summary || {};
  const categories = est.categories || [];

  let html = '';

  // ヘッダー
  html += `
    <div class="est-header">
      <div class="est-header-left">
        <h2>${est.title || '御見積書'}</h2>
        <p>${est.projectName || ''}</p>
      </div>
      <div class="est-header-right">
        <div>提出日: ${est.date || new Date().toLocaleDateString('ja-JP')}</div>
        <div>見積No: ${est.estimateNo || 'E2026-0001'}</div>
        <div style="margin-top:8px; font-weight:700;">株式会社NARUSE</div>
      </div>
    </div>
  `;

  // サマリー
  html += `
    <div class="est-summary">
      <div class="est-summary-grid">
        <div class="est-summary-left">
          <div class="est-info-row"><span class="est-info-label">宛先</span><span class="est-info-value">${est.clientName || '御中'}</span></div>
          <div class="est-info-row"><span class="est-info-label">工事名称</span><span class="est-info-value">${est.projectName || ''}</span></div>
          <div class="est-info-row"><span class="est-info-label">工事場所</span><span class="est-info-value">${est.location || ''}</span></div>
          ${est.constructionPeriod ? `
          <div class="est-info-row"><span class="est-info-label">着工予定</span><span class="est-info-value">${est.constructionPeriod.start || ''}</span></div>
          <div class="est-info-row"><span class="est-info-label">竣工予定</span><span class="est-info-value">${est.constructionPeriod.end || ''}</span></div>
          <div class="est-info-row"><span class="est-info-label">工期</span><span class="est-info-value">${est.constructionPeriod.duration || ''}</span></div>
          ` : ''}
        </div>
        <div class="est-summary-right">
          <div class="est-total-box">
            <div class="est-total-label">お見積金額（税込）</div>
            <div class="est-total-amount">&yen;${formatNum(summary.totalWithTax)}<small>-</small></div>
            <div class="est-total-breakdown">
              本体: &yen;${formatNum(summary.totalBeforeTax)} ／ 消費税: &yen;${formatNum(summary.tax)}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  // 内訳総括表
  html += `<div class="est-body"><h3>内訳総括表</h3>`;
  html += `<table class="est-table">
    <thead><tr>
      <th style="width:50px;">No</th>
      <th>名称</th>
      <th>仕様</th>
      <th style="width:70px;" class="num">数量</th>
      <th style="width:50px;">単位</th>
      <th style="width:110px;" class="num">単価</th>
      <th style="width:130px;" class="num">金額</th>
      <th style="width:100px;">備考</th>
    </tr></thead><tbody>`;

  categories.forEach(cat => {
    html += `<tr class="category-row">
      <td>${cat.id}</td>
      <td colspan="5">${cat.name}</td>
      <td class="num">${formatNum(cat.amount)}</td>
      <td></td>
    </tr>`;
  });

  // 計
  html += `<tr class="subtotal-row">
    <td></td><td colspan="5" style="text-align:right;">計</td>
    <td class="num">${formatNum(summary.subtotal)}</td><td></td>
  </tr>`;

  if (summary.discount) {
    html += `<tr class="discount-row">
      <td></td><td colspan="5" style="text-align:right;">出精値引</td>
      <td class="num">&&#9650; ${formatNum(Math.abs(summary.discount))}</td><td></td>
    </tr>`;
  }

  html += `<tr class="subtotal-row">
    <td></td><td colspan="5" style="text-align:right;">工事価格</td>
    <td class="num">${formatNum(summary.constructionPrice)}</td><td></td>
  </tr>`;

  if (summary.legalWelfare) {
    html += `<tr>
      <td></td><td colspan="5" style="text-align:right;">法定福利費</td>
      <td class="num">${formatNum(summary.legalWelfare)}</td><td></td>
    </tr>`;
  }

  html += `<tr class="subtotal-row">
    <td></td><td colspan="5" style="text-align:right;">税抜合計</td>
    <td class="num">${formatNum(summary.totalBeforeTax)}</td><td></td>
  </tr>`;
  html += `<tr>
    <td></td><td colspan="5" style="text-align:right;">消費税等（10%）</td>
    <td class="num">${formatNum(summary.tax)}</td><td></td>
  </tr>`;
  html += `<tr class="total-row">
    <td></td><td colspan="5" style="text-align:right;">合 計</td>
    <td class="num">&yen;${formatNum(summary.totalWithTax)}</td><td></td>
  </tr>`;

  html += `</tbody></table>`;

  // カテゴリ別詳細
  categories.forEach(cat => {
    if (!cat.items || cat.items.length === 0) return;

    html += `<h3 style="margin-top:32px;">${cat.id}. ${cat.name} 明細</h3>`;
    html += `<table class="est-table">
      <thead><tr>
        <th style="width:70px;">No</th>
        <th>名称</th>
        <th>仕様</th>
        <th style="width:70px;" class="num">数量</th>
        <th style="width:50px;">単位</th>
        <th style="width:110px;" class="num">単価</th>
        <th style="width:130px;" class="num">金額</th>
        <th style="width:100px;">備考</th>
      </tr></thead><tbody>`;

    cat.items.forEach(item => {
      html += `<tr class="item-row">
        <td>${item.id}</td>
        <td>${item.name}</td>
        <td>${item.specification || ''}</td>
        <td class="num">${item.quantity || ''}</td>
        <td>${item.unit || ''}</td>
        <td class="num">${formatNum(item.unitPrice)}</td>
        <td class="num">${formatNum(item.amount)}</td>
        <td>${item.note || ''}</td>
      </tr>`;

      if (item.details) {
        item.details.forEach(d => {
          html += `<tr class="detail-row">
            <td></td>
            <td>${d.name || ''}</td>
            <td>${d.specification || ''}</td>
            <td class="num">${d.quantity || ''}</td>
            <td>${d.unit || ''}</td>
            <td class="num">${formatNum(d.unitPrice)}</td>
            <td class="num">${formatNum(d.amount)}</td>
            <td>${d.note || ''}</td>
          </tr>`;
        });
      }
    });

    html += `<tr class="subtotal-row">
      <td></td><td colspan="5" style="text-align:right;">${cat.id}-計</td>
      <td class="num">${formatNum(cat.amount)}</td><td></td>
    </tr>`;
    html += `</tbody></table>`;
  });

  html += `</div>`;

  // 特記事項
  if (est.notes || est.specialNotes) {
    const notes = est.notes || est.specialNotes || [];
    if (notes.length > 0) {
      html += `<div class="est-notes"><h4>特記事項</h4><ul>`;
      notes.forEach(n => { html += `<li>${escapeHtml(n)}</li>`; });
      html += `</ul></div>`;
    }
  }

  doc.innerHTML = html;
}

// ===== 抽出データレンダリング =====
function renderExtraction(data) {
  const el = document.getElementById('extractionContent');
  if (!data || data.raw) {
    el.innerHTML = `<h3>抽出データ</h3><pre style="white-space:pre-wrap;font-size:13px;">${escapeHtml(data?.raw || 'データなし')}</pre>`;
    return;
  }

  let html = `<h3>AI抽出データ: ${data.projectName || data.buildingName || ''}</h3>`;

  if (data.constructionScope) {
    html += `<div style="margin-bottom:20px; padding:16px; background:var(--bg-sub); border-radius:8px;">
      <strong>施工範囲:</strong> ${(data.constructionScope.targetFloors || []).join(', ')}<br>
      <strong>足場工事:</strong> ${data.constructionScope.scaffoldingRequired ? '必要' : '不要'} ／
      <strong>夜間作業:</strong> ${data.constructionScope.nightWorkRequired ? 'あり' : 'なし'}
    </div>`;
  }

  if (data.floors && data.floors.length > 0) {
    html += `<div class="floor-grid">`;
    data.floors.forEach(floor => {
      html += `<div class="floor-card"><h4>${floor.floor}</h4><table>`;
      (floor.fixtures || []).forEach(f => {
        html += `<tr><td>${f.type}${f.modelCode ? ' ('+f.modelCode+')' : ''}</td><td>${f.quantity} ${f.unit || '台'}</td></tr>`;
      });
      html += `</table></div>`;
    });
    html += `</div>`;
  }

  if (data.fixtureModels && data.fixtureModels.length > 0) {
    html += `<h3 style="margin-top:24px;">器具一覧</h3>`;
    html += `<table class="est-table"><thead><tr>
      <th>コード</th><th>メーカー</th><th>型番</th><th>説明</th><th>消費電力</th><th class="num">想定単価</th>
    </tr></thead><tbody>`;
    data.fixtureModels.forEach(m => {
      html += `<tr>
        <td>${m.code || ''}</td>
        <td>${m.manufacturer || ''}</td>
        <td>${m.modelNumber || ''}</td>
        <td>${m.description || ''}</td>
        <td>${m.wattage || ''}</td>
        <td class="num">${formatNum(m.estimatedUnitPrice)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  if (data.specialNotes && data.specialNotes.length > 0) {
    html += `<div style="margin-top:20px;"><strong>特記事項:</strong><ul style="margin-top:8px;">`;
    data.specialNotes.forEach(n => { html += `<li style="margin-bottom:4px;">${escapeHtml(n)}</li>`; });
    html += `</ul></div>`;
  }

  el.innerHTML = html;
}

// ===== タブ切り替え =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  event.target.classList.add('active');
  document.getElementById(`tab-${name}`).style.display = 'block';
}

// ===== CSV出力 =====
function downloadCSV() {
  if (!estimateData) return;
  const est = estimateData.estimate || estimateData;
  const categories = est.categories || [];
  let csv = '\uFEFF'; // BOM for Excel
  csv += 'No,名称,仕様,数量,単位,単価,金額,備考\n';

  categories.forEach(cat => {
    csv += `${cat.id},${cat.name},,,,,"${formatNum(cat.amount)}",\n`;
    (cat.items || []).forEach(item => {
      csv += `${item.id},"${item.name}","${item.specification||''}",${item.quantity||''},${item.unit||''},"${formatNum(item.unitPrice)}","${formatNum(item.amount)}","${item.note||''}"\n`;
      (item.details || []).forEach(d => {
        csv += `,"${d.name||''}","${d.specification||''}",${d.quantity||''},${d.unit||''},"${formatNum(d.unitPrice)}","${formatNum(d.amount)}","${d.note||''}"\n`;
      });
    });
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  downloadBlob(blob, `見積書_${est.projectName || 'estimate'}.csv`);
}

// ===== JSON出力 =====
function downloadJSON() {
  if (!estimateData) return;
  const blob = new Blob([JSON.stringify(estimateData, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `見積書_${(estimateData.estimate||estimateData).projectName || 'estimate'}.json`);
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== ユーティリティ =====
function formatNum(n) {
  if (n == null || n === '' || isNaN(n)) return '';
  return Number(n).toLocaleString('ja-JP');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
